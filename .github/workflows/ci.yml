name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare log directory
        shell: bash
        run: mkdir -p ci_logs

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.9.4"

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          dart pub get 2>&1 | tee ci_logs/01-pub-get.log

      - name: Install SIP
        shell: bash
        run: |
          set -o pipefail
          dart pub global activate --source path . 2>&1 | tee ci_logs/02-install-sip.log

      - name: Run shell smoke test
        shell: bash
        working-directory: test/integration/smoke
        run: |
          set -o pipefail
          {
            echo "=== platform ==="
            uname -a 2>/dev/null || ver
            echo "=== PATH ==="
            echo "$PATH"
            echo "=== dart pub get ==="
            dart pub get
            echo "=== sip run smoke --loud ==="
            dart pub global run sip_cli:sip run smoke --loud
          } 2>&1 | tee "${GITHUB_WORKSPACE}/ci_logs/03-smoke-test.log"

      - name: Upload step logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci_logs-${{ matrix.os }}
          path: ci_logs/
          if-no-files-found: warn
